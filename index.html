<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locked Out of Heaven — Rhythm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0e0d22;
    --bg-mid:#1a1840;
    --gold:#f6c453;
    --violet:#8c6bff;
    --ember:#e94560;
    --mist:#eae6ff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(ellipse at 50% 10%, var(--bg-mid), var(--bg-deep) 75%);
    font-family:'Poppins',sans-serif;
    color:var(--mist);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  .stage{
    position:relative;
    width:100%;
    max-width:900px;
    aspect-ratio:16/9;
    margin:auto;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(140,107,255,0.25), 0 30px 80px rgba(0,0,0,0.6);
  }
  canvas{ display:block; width:100%; height:100%; }

  .hud{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:14px 20px;
    pointer-events:none;
    font-family:'Poppins',sans-serif;
  }
  .hud .col{ display:flex; flex-direction:column; gap:2px; }
  .hud .label{ font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:rgba(234,230,255,.5); }
  .hud .value{ font-family:'Cinzel',serif; font-weight:700; font-size:20px; color:var(--gold); text-shadow:0 0 10px rgba(246,196,83,.4); }
  .hud .value.miss{ color:var(--ember); text-shadow:0 0 10px rgba(233,69,96,.4); }
  .hud .right{ align-items:flex-end; }

  .mute-btn{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    pointer-events:auto;
    background:rgba(20,18,45,0.55);
    border:1px solid rgba(140,107,255,0.4);
    color:var(--mist);
    width:34px;height:34px;
    border-radius:50%;
    cursor:pointer;
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(6px);
  }

  .combo{
    position:absolute; left:50%; top:60%; transform:translate(-50%,-50%);
    font-family:'Cinzel',serif; font-weight:800; font-size:34px;
    color:var(--gold); text-shadow:0 0 20px rgba(246,196,83,.5);
    opacity:0; pointer-events:none; transition:opacity .1s ease;
  }

  .overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    background:linear-gradient(180deg, rgba(14,13,34,0.2), rgba(14,13,34,0.85) 65%);
    gap:12px; padding:24px;
    transition:opacity .3s ease;
  }
  .overlay.hidden{ opacity:0; pointer-events:none; }
  .eyebrow{ font-size:12px; letter-spacing:.35em; text-transform:uppercase; color:var(--violet); font-weight:600; }
  h1.title{
    font-family:'Cinzel',serif; font-weight:800;
    font-size:clamp(26px,6vw,46px); margin:0 0 4px;
    background:linear-gradient(180deg,#fff6da,var(--gold) 55%,#b8863a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(246,196,83,0.2); line-height:1.05;
  }
  .subtitle{ font-size:13px; color:rgba(234,230,255,.7); max-width:420px; line-height:1.6; }

  .levels{ display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
  .level-card{
    width:150px; padding:16px 12px; border-radius:14px;
    background:rgba(28,25,60,.55); border:1px solid rgba(140,107,255,.35);
    cursor:pointer; transition:transform .15s ease, border-color .15s ease;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .level-card:hover{ transform:translateY(-4px); border-color:var(--gold); }
  .level-card .num{ font-family:'Cinzel',serif; font-weight:700; font-size:26px; color:var(--gold); }
  .level-card .name{ font-size:12px; color:rgba(234,230,255,.75); }
  .level-card .stars{ font-size:14px; letter-spacing:2px; color:var(--gold); min-height:16px; }
  .level-card .stars .dim{ color:rgba(234,230,255,.25); }

  .cta{
    margin-top:6px; font-family:'Cinzel',serif; font-weight:700; font-size:16px; color:#1a1730;
    background:linear-gradient(180deg,#ffe9ad,var(--gold)); border:none;
    padding:12px 32px; border-radius:999px; cursor:pointer; letter-spacing:.05em;
    box-shadow:0 10px 30px rgba(246,196,83,.35); transition:transform .15s ease;
  }
  .cta:hover{ transform:translateY(-2px); }
  .cta.ghost{
    background:transparent; color:var(--mist); border:1px solid rgba(234,230,255,.35);
    box-shadow:none;
  }
  .hint{ margin-top:2px; font-size:11px; color:rgba(234,230,255,.45); }
  .results-row{ display:flex; gap:26px; margin-top:6px; }
  .results-row .r{ text-align:center; }
  .results-row .r .v{ font-family:'Cinzel',serif; font-weight:700; font-size:22px; color:var(--gold); }
  .results-row .r .l{ font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:rgba(234,230,255,.55); }
  .stars-big{ font-size:30px; letter-spacing:6px; color:var(--gold); margin-top:6px; }
  .stars-big .dim{ color:rgba(234,230,255,.2); }
  .btn-row{ display:flex; gap:12px; margin-top:14px; }
  @media (prefers-reduced-motion: reduce){ * { animation-duration:.001ms !important; } }
</style>
</head>
<body>

<div class="stage">
  <canvas id="game"></canvas>

  <div class="hud" id="hud" style="display:none">
    <div class="col">
      <span class="label">Accuracy</span>
      <span class="value" id="accVal">100%</span>
    </div>
    <div class="col right">
      <span class="label">Misses</span>
      <span class="value miss" id="missVal">0</span>
      <span class="label" style="margin-top:6px">Notes</span>
      <span class="value" id="noteVal">0/0</span>
    </div>
  </div>
  <button class="mute-btn" id="muteBtn" style="display:none" aria-label="كتم/تشغيل الصوت">🔊</button>
  <div class="combo" id="comboEl">COMBO ×0</div>

  <div class="overlay" id="selectOverlay">
    <div class="eyebrow">اختاري مستوى</div>
    <h1 class="title">Locked Out<br>of Heaven</h1>
    <p class="subtitle">اضغطي مسافة أو انقري بالضبط لما تصل النوطة للدائرة المركزية. كل مستوى أسرع وأصعب من اللي قبلو.</p>
    <div class="levels" id="levelsWrap"></div>
    <div class="hint">Space / نقرة = ضربة على الإيقاع</div>
  </div>

  <div class="overlay hidden" id="resultsOverlay">
    <div class="eyebrow" id="resultsEyebrow">المستوى الأول</div>
    <h1 class="title" id="resultsTitle" style="font-size:clamp(24px,5vw,38px)">أُنجز</h1>
    <div class="results-row">
      <div class="r"><div class="v" id="rAcc">100%</div><div class="l">Accuracy</div></div>
      <div class="r"><div class="v" id="rMiss">0</div><div class="l">Misses</div></div>
      <div class="r"><div class="v" id="rScore">0</div><div class="l">Score</div></div>
    </div>
    <div class="stars-big" id="rStars">★★★</div>
    <div class="btn-row">
      <button class="cta ghost" id="backBtn">المستويات</button>
      <button class="cta" id="nextBtn">المستوى التالي</button>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const accVal = document.getElementById('accVal');
  const missVal = document.getElementById('missVal');
  const noteVal = document.getElementById('noteVal');
  const muteBtn = document.getElementById('muteBtn');
  const comboEl = document.getElementById('comboEl');
  const selectOverlay = document.getElementById('selectOverlay');
  const resultsOverlay = document.getElementById('resultsOverlay');
  const levelsWrap = document.getElementById('levelsWrap');
  const resultsEyebrow = document.getElementById('resultsEyebrow');
  const resultsTitle = document.getElementById('resultsTitle');
  const rAcc = document.getElementById('rAcc');
  const rMiss = document.getElementById('rMiss');
  const rScore = document.getElementById('rScore');
  const rStars = document.getElementById('rStars');
  const backBtn = document.getElementById('backBtn');
  const nextBtn = document.getElementById('nextBtn');

  let W=900,H=506;
  function resize(){
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    W = rect.width; H = rect.height;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- LEVELS CONFIG ----------
  const LEVELS = [
    { name:'الفجر', notes:18, travel:1500, spawnGap:820, minGap:600 },
    { name:'العاصفة', notes:26, travel:1150, spawnGap:640, minGap:430 },
    { name:'البوابة', notes:34, travel:900,  spawnGap:500, minGap:330 },
  ];
  let bestStars = LEVELS.map(()=>0);
  let currentLevelIdx = 0;

  // ---------- AUDIO ----------
  let actx = null, muted = false, musicTimer = null;
  function initAudio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }
  function tone(freq,dur,type,vol,delay){
    if(!actx||muted) return;
    const t0 = actx.currentTime + (delay||0);
    const osc = actx.createOscillator(), gain = actx.createGain();
    osc.type = type||'sine';
    osc.frequency.setValueAtTime(freq,t0);
    gain.gain.setValueAtTime(0,t0);
    gain.gain.linearRampToValueAtTime(vol||0.15,t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    osc.connect(gain).connect(actx.destination);
    osc.start(t0); osc.stop(t0+dur+0.05);
  }
  function sfxPerfect(){ tone(1046,0.12,'sine',0.15); tone(1568,0.14,'sine',0.09,0.04); }
  function sfxGood(){ tone(784,0.12,'sine',0.13); }
  function sfxMiss(){ tone(180,0.25,'sawtooth',0.14); }
  const scale=[261.6,329.6,392.0,523.3,392.0,329.6];
  let noteIdx=0;
  function musicStep(){ if(!actx||muted) return; const f=scale[noteIdx%scale.length]; tone(f,1.5,'sine',0.045); noteIdx++; }
  function startMusic(){ if(musicTimer) return; musicStep(); musicTimer=setInterval(musicStep,650); }
  function stopMusic(){ if(musicTimer){clearInterval(musicTimer); musicTimer=null;} }
  muteBtn.addEventListener('click', ()=>{ muted=!muted; muteBtn.textContent = muted?'🔇':'🔊'; });

  // ---------- GAME STATE ----------
  let state='select'; // select | playing | results
  let notes=[]; // {angle, spawnT, hitT, resolved, result}
  let spawnedCount=0, totalToSpawn=0, spawnTimer=0, lastSpawnGap=0;
  let hits=0, misses=0, accSum=0, score=0, combo=0, maxCombo=0;
  let bgStars=[];
  const hitR = ()=> Math.min(W,H)*0.075;
  const spawnDist = ()=> Math.min(W,H)*0.42;

  function initBgStars(){
    bgStars=[];
    for(let i=0;i<60;i++) bgStars.push({x:Math.random()*W,y:Math.random()*H*0.8,r:Math.random()*1.5+.3,tw:Math.random()*Math.PI*2});
  }

  function buildLevelCards(){
    levelsWrap.innerHTML='';
    LEVELS.forEach((lv,i)=>{
      const card=document.createElement('div');
      card.className='level-card';
      const starStr = '★'.repeat(bestStars[i]) + '<span class="dim">'+'★'.repeat(3-bestStars[i])+'</span>';
      card.innerHTML = `<div class="num">${i+1}</div><div class="name">${lv.name}</div><div class="stars">${starStr}</div>`;
      card.addEventListener('click', ()=> startLevel(i));
      levelsWrap.appendChild(card);
    });
  }

  function startLevel(idx){
    currentLevelIdx = idx;
    initAudio();
    if (actx && actx.state==='suspended') actx.resume();
    const lv = LEVELS[idx];
    notes = []; spawnedCount=0; totalToSpawn=lv.notes; spawnTimer=0;
    hits=0; misses=0; accSum=0; score=0; combo=0; maxCombo=0;
    updateHud();
    state='playing';
    selectOverlay.classList.add('hidden');
    resultsOverlay.classList.add('hidden');
    hud.style.display='flex';
    muteBtn.style.display='flex';
    startMusic();
  }

  function updateHud(){
    const total = hits+misses;
    const accPct = total>0 ? Math.round((accSum/total)*100) : 100;
    accVal.textContent = accPct+'%';
    missVal.textContent = misses;
    noteVal.textContent = (hits+misses)+'/'+totalToSpawn;
  }

  function showCombo(){
    if (combo>=2){
      comboEl.textContent = 'COMBO ×'+combo;
      comboEl.style.opacity='1';
      clearTimeout(showCombo._t);
      showCombo._t = setTimeout(()=>{ comboEl.style.opacity='0'; }, 380);
    }
  }

  function spawnNote(lv){
    const angle = Math.random()*Math.PI*2;
    const now = performance.now();
    notes.push({ angle, spawnT: now, hitT: now+lv.travel, resolved:false });
    spawnedCount++;
  }

  function resolveMiss(n){
    n.resolved = true;
    misses++; combo=0; accSum += 0;
    sfxMiss();
    updateHud();
    checkLevelEnd();
  }

  function attemptHit(){
    if (state!=='playing') return;
    const now = performance.now();
    let best=null, bestDiff=Infinity;
    notes.forEach(n=>{
      if (n.resolved) return;
      const diff = Math.abs(now - n.hitT);
      if (diff < 220 && diff < bestDiff){ bestDiff=diff; best=n; }
    });
    if (!best) return;
    best.resolved = true;
    hits++;
    let weight, grade;
    if (bestDiff<=70){ weight=1; grade='PERFECT'; sfxPerfect(); score+=100; }
    else { weight=0.65; grade='GOOD'; sfxGood(); score+=60; }
    accSum += weight;
    combo++; maxCombo=Math.max(maxCombo,combo);
    showCombo();
    updateHud();
    checkLevelEnd();
  }

  function checkLevelEnd(){
    if (spawnedCount>=totalToSpawn && notes.every(n=>n.resolved)){
      finishLevel();
    }
  }

  function finishLevel(){
    state='results';
    stopMusic();
    hud.style.display='none';
    muteBtn.style.display='none';
    const total = hits+misses;
    const accPct = total>0 ? Math.round((accSum/total)*100) : 100;
    let stars = 1;
    if (accPct>=95 && misses===0) stars=3;
    else if (accPct>=80) stars=2;
    else stars=1;
    if (stars>bestStars[currentLevelIdx]) bestStars[currentLevelIdx]=stars;

    resultsEyebrow.textContent = 'المستوى ' + (currentLevelIdx+1) + ' — ' + LEVELS[currentLevelIdx].name;
    resultsTitle.textContent = accPct>=80 ? 'أشرقتِ ✦' : 'واصلي المحاولة';
    rAcc.textContent = accPct+'%';
    rMiss.textContent = misses;
    rScore.textContent = score;
    rStars.innerHTML = '★'.repeat(stars) + '<span class="dim">'+'★'.repeat(3-stars)+'</span>';
    nextBtn.style.display = currentLevelIdx < LEVELS.length-1 ? 'inline-block' : 'none';
    resultsOverlay.classList.remove('hidden');
  }

  backBtn.addEventListener('click', ()=>{
    state='select';
    resultsOverlay.classList.add('hidden');
    buildLevelCards();
    selectOverlay.classList.remove('hidden');
  });
  nextBtn.addEventListener('click', ()=> startLevel(currentLevelIdx+1));

  window.addEventListener('keydown',(e)=>{
    if (e.code==='Space'){ e.preventDefault(); attemptHit(); }
  });
  canvas.addEventListener('pointerdown', ()=> attemptHit());

  // ---------- DRAW ----------
  function drawBackdrop(){
    ctx.clearRect(0,0,W,H);
    const gateX=W*0.5, gateY=H*0.14;
    const glow = ctx.createRadialGradient(gateX,gateY,4,gateX,gateY,130);
    glow.addColorStop(0,'rgba(246,196,83,0.28)');
    glow.addColorStop(1,'rgba(246,196,83,0)');
    ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);
    bgStars.forEach(b=>{
      b.tw+=0.02;
      const a=0.35+Math.sin(b.tw)*0.3;
      ctx.fillStyle=`rgba(234,230,255,${Math.max(a,0.12)})`;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    });
  }

  function drawReticle(){
    const cx=W/2, cy=H/2, r=hitR();
    ctx.save();
    ctx.strokeStyle='rgba(246,196,83,0.7)';
    ctx.lineWidth=2.5;
    // corner brackets
    const bl=22, off=r+16;
    [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sy])=>{
      const bx=cx+sx*off, by=cy+sy*off;
      ctx.beginPath();
      ctx.moveTo(bx, by - sy*bl);
      ctx.lineTo(bx, by);
      ctx.lineTo(bx - sx*bl, by);
      ctx.stroke();
    });
    // center hit circle
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(246,196,83,0.9)';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='rgba(246,196,83,0.9)';
    ctx.fill();
    ctx.restore();
  }

  function drawNotes(){
    const cx=W/2, cy=H/2, r=hitR();
    const now=performance.now();
    notes.forEach(n=>{
      if (n.resolved) return;
      const total = n.hitT - n.spawnT;
      const frac = Math.min(Math.max((now-n.spawnT)/total,0),1);
      const dist = spawnDist() * (1-frac);
      const x = cx + Math.cos(n.angle)*dist;
      const y = cy + Math.sin(n.angle)*dist;
      // trailing streak
      ctx.save();
      ctx.strokeStyle='rgba(233,69,96,0.35)';
      ctx.lineWidth=6;
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(cx + Math.cos(n.angle)*(dist+26), cy + Math.sin(n.angle)*(dist+26));
      ctx.stroke();
      // note body
      ctx.beginPath();
      ctx.arc(x,y,10,0,Math.PI*2);
      ctx.fillStyle='#e94560';
      ctx.shadowColor='rgba(233,69,96,0.7)';
      ctx.shadowBlur=10;
      ctx.fill();
      ctx.restore();

      if (now > n.hitT + 220) resolveMiss(n);
    });
  }

  let lastTs=null;
  function loop(ts){
    if (lastTs===null) lastTs=ts;
    const dt = ts-lastTs; lastTs=ts;

    drawBackdrop();

    if (state==='playing'){
      const lv = LEVELS[currentLevelIdx];
      spawnTimer -= dt;
      if (spawnTimer<=0 && spawnedCount<totalToSpawn){
        spawnNote(lv);
        spawnTimer = Math.max(lv.spawnGap - spawnedCount*6, lv.minGap) + (Math.random()*120-60);
      }
      drawReticle();
      drawNotes();
    } else if (state==='select'){
      drawReticle();
    }

    requestAnimationFrame(loop);
  }

  initBgStars();
  buildLevelCards();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
